<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids A-Z Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="game">

  <h1>🎮 Kids A-Z Game</h1>

  <div class="status">
    ⭐ Score: <b id="score">0</b> |
    ❌ Wrong: <b id="wrong">0</b>/3
  </div>

  <div class="timer">
    ⏳ Time Left: <b id="time">25</b>s
  </div>

  <!-- Letter -->
  <div id="letter">A</div>

  <!-- 🔊 Sound Button -->
  <button onclick="playLetterSound(letters[current])" class="sound-btn">
    🔊 Play Sound
  </button>

  <!-- Options -->
  <div class="options">
    <div class="option" onclick="checkAnswer(this)">
      <img src=""><p></p>
    </div>

    <div class="option" onclick="checkAnswer(this)">
      <img src=""><p></p>
    </div>

    <div class="option" onclick="checkAnswer(this)">
      <img src=""><p></p>
    </div>
  </div>

  <button onclick="nextQuestion()">Next ➡️</button>

</div>

<div id="celebrate">🎉</div>

<script src="script.js"></script>
</body>
</html>
